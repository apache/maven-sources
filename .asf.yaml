# see https://s.apache.org/asfyaml
github:
  description: "Apache Maven Sources"
  homepage: https://maven.apache.org/scm.html
  labels:
    - java
    - build-management
    - maven
  enabled_merge_buttons:
    squash: true
    merge: false
    rebase: true
  features:
    issues: true
  rulesets:
    - name: "Default Branch Protection"
      type: branch
      branches:
        includes:
          - "~DEFAULT_BRANCH"
          - "release/*"
          - "rel/*"
        excludes: []
      bypass_teams:
        - root
      restrict_deletion: true
      restrict_force_push: true
notifications:
  commits: commits@maven.apache.org
  issues: issues@maven.apache.org
  jira_options: link label comment
